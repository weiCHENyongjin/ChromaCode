name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  python:
    name: Python reconstruction test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Run end-to-end test
        run: python tests/test_reconstruction.py

  cpp:
    name: C++ port (shared config)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Armadillo
        run: sudo apt-get update && sudo apt-get install -y libarmadillo-dev
      - name: Build demo
        run: g++ -std=c++17 -O2 cpp/demo.cpp -larmadillo -o chromacode_demo
      - name: Run demo on the shared JSON config (asserts mean RMSE ~ 0.044)
        run: ./chromacode_demo config/default_10ch.json cpp/sample_signal.csv
